# Render blueprint. With this file in the repo root, Render configures the
# service itself — New > Blueprint > pick the repo. No dashboard fiddling.
#
# One instance on purpose: rooms live in memory, so every player in a party
# must land on the same process. Do not raise numInstances without moving
# room state somewhere shared (Redis or similar) first.
services:
  - type: web
    name: samay-sparsh
    runtime: node
    plan: free
    numInstances: 1
    buildCommand: npm install     # no dependencies — this is a no-op, kept for clarity
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: "22"
